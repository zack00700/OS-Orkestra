services:
  # ── Backend API ──────────────────────────────────────
  - type: web
    name: orkestra-api
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip &&
      pip install fastapi "uvicorn[standard]" "sqlalchemy[asyncio]" pydantic pydantic-settings pyjwt python-multipart httpx email-validator python-dotenv pymssql aiosqlite
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        sync: false

  # ── Frontend ─────────────────────────────────────────
  - type: web
    name: orkestra-front
    runtime: static
    region: frankfurt
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
