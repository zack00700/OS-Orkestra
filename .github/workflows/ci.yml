name: OS Orkestra CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ──────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" "sqlalchemy[asyncio]" pydantic pydantic-settings pyjwt python-multipart httpx email-validator python-dotenv aiosqlite
          pip install pytest pytest-asyncio httpx ruff

      - name: Lint with ruff
        run: ruff check app/ --ignore E501,F401

      - name: Run tests
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          ENVIRONMENT: "test"
          DEBUG: "false"
          JWT_SECRET_KEY: "test-secret-key-for-ci"
          SECRET_KEY: "test-secret-key-for-ci"
          ALLOWED_ORIGINS: '["*"]'
        run: pytest tests/ -v --tb=short

  # ── Frontend Build ─────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
